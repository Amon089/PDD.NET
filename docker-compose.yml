services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: habitto-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Habitto#2026Strong"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - habitto_sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Habitto#2026Strong\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habitto-api
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=HabittoDb;User Id=sa;Password=Habitto#2026Strong;TrustServerCertificate=True;"

volumes:
  habitto_sqldata:
