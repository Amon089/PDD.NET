<body class="bg-background text-on-surface">

<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-md border-b border-outline-variant/30 h-20 shadow-sm">
    <div class="max-w-container-max mx-auto px-4 md:px-lg flex justify-between items-center h-full">
        <div class="flex items-center gap-xl">
            <a class="font-display text-headline-sm font-bold text-primary" href="home.html">HabitTo</a>

                <a class="text-primary border-b-2 border-primary pb-1 font-semibold" href="trips.html">Trips</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="profile.html">Dashboard</a>
            </div>
        </div>
        <div class="flex items-center gap-md">
            <div class="hidden sm:flex items-center gap-sm mr-md">
                <button class="p-2 rounded-full hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined text-on-surface-variant">language</span></button>
                <button class="p-2 rounded-full hover:bg-surface-container-high transition-colors" id="theme-toggle"><span class="material-symbols-outlined text-on-surface-variant" id="theme-icon">dark_mode</span></button>

            </div>

<main class="pt-32 pb-xl min-h-screen max-w-container-max mx-auto px-4 md:px-lg">
    <!-- Title & Tabs -->
    <header class="mb-xl">
        <h1 class="font-display text-headline-lg mb-lg">Trips and Favorites</h1>
        <div class="flex border-b border-outline-variant">
            <button class="px-lg py-md font-label-md text-label-md border-b-2 border-transparent hover:text-primary transition-colors tab-active" id="tab-bookings" onclick="switchTab('bookings')">My Bookings</button>
            <button class="px-lg py-md font-label-md text-label-md border-b-2 border-transparent hover:text-primary transition-colors text-on-surface-variant" id="tab-favorites" onclick="switchTab('favorites')">My Favorites</button>
        </div>
    </header>

    <!-- View: Bookings -->
    <div class="view-content animate-in fade-in duration-500" id="view-bookings">
        <div class="space-y-lg">
            <h2 class="font-headline-sm text-on-surface-variant mb-md">Upcoming Stays</h2>
            <div id="upcoming-stays-list" class="space-y-lg">
                <!-- Upcoming Booking items populated dynamically -->
            </div>
        </div>
        
        <!-- Past Bookings Section -->
        <div class="mt-xl pt-xl border-t border-outline-variant">
            <h2 class="font-headline-sm text-on-surface-variant mb-md opacity-60">Past Stays</h2>
            <div id="past-stays-grid" class="grid grid-cols-1 md:grid-cols-2 gap-lg">
                <!-- Past booking items populated dynamically -->
            </div>
        </div>
    </div>

    <!-- View: Favorites -->
    <div class="view-content hidden animate-in fade-in duration-500" id="view-favorites">
        <div id="favorites-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-xl">
            <!-- Favorite properties populated dynamically -->
        </div>
    </div>
</main>

<script src="app.js"></script>
<script>
    let activeTab = 'bookings';
    let wishlistIds = [];

    function getQueryParam(param) {
        return new URLSearchParams(window.location.search).get(param);
    }

    async function initTrips() {
        const user = Auth.getUser();
        if (!user) {
            HabittoUI.toggleAuthModal(true, 'login');
            return;
        }

        const defaultTab = getQueryParam('tab');
        if (defaultTab === 'favorites') {
            switchTab('favorites');
        } else {
            await renderBookings();
        }
    }

    function switchTab(tab) {
        activeTab = tab;
        const viewBookings  = document.getElementById('view-bookings');
        const viewFavorites = document.getElementById('view-favorites');
        const tabBookings   = document.getElementById('tab-bookings');
        const tabFavorites  = document.getElementById('tab-favorites');

        if (tab === 'bookings') {
            viewBookings.classList.remove('hidden');
            viewFavorites.classList.add('hidden');
            tabBookings.className  = 'px-lg py-md font-label-md text-label-md border-b-2 border-primary text-primary transition-colors tab-active';
            tabFavorites.className = 'px-lg py-md font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant hover:text-primary transition-colors';
            renderBookings();
        } else {
            viewBookings.classList.add('hidden');
            viewFavorites.classList.remove('hidden');
            tabFavorites.className = 'px-lg py-md font-label-md text-label-md border-b-2 border-primary text-primary transition-colors tab-active';
            tabBookings.className  = 'px-lg py-md font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant hover:text-primary transition-colors';
            renderFavorites();
        }
    }

    async function renderBookings() {
        const user = Auth.getUser();
        const upcomingContainer = document.getElementById('upcoming-stays-list');
        const pastContainer     = document.getElementById('past-stays-grid');

        upcomingContainer.innerHTML = '<p class="text-on-surface-variant text-label-md">Loading...</p>';
        pastContainer.innerHTML = '';

        let bookings = [];
        try {
            bookings = await HabittoAPI.getBookings(user.id);
        } catch (e) {
            upcomingContainer.innerHTML = `<p class="text-error font-label-md">Could not load bookings: ${e.message}</p>`;
            return;
        }

        const upcoming = bookings.filter(b => b.status === 'Confirmed' || b.status === 'Pending');
        const past     = bookings.filter(b => b.status === 'Completed' || b.status === 'Cancelled');

        upcomingContainer.innerHTML = '';

        if (upcoming.length === 0) {
            upcomingContainer.innerHTML = `
                <div class="bg-surface-container-low rounded-xl p-xl text-center border border-dashed border-outline-variant/30">
                    <span class="material-symbols-outlined text-[48px] text-outline-variant mb-md">travel</span>
                    <h3 class="font-headline-sm text-on-surface">No upcoming stays</h3>
                    <p class="text-on-surface-variant mb-md">Time to start planning your next escape!</p>
                    <a href="home.html" class="bg-primary text-on-primary font-bold px-lg py-md rounded-xl inline-block shadow-sm hover:opacity-90 transition-opacity">Explore Properties</a>
                </div>
            `;
        } else {
            for (const b of upcoming) {
                // Fetch property for visual info
                let prop = null;
                try { prop = await HabittoAPI.getProperty(b.propertyId); } catch {}
                const images = prop?.images || ['https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=400&q=80'];
                const title  = prop?.title || b.propertyId;
                const city   = prop?.city  || '';

                const statusColor = b.status === 'Pending' ? 'bg-amber-400' : 'bg-green-500';
                const item = document.createElement('div');
                item.className = 'flex flex-col md:flex-row bg-surface-container-lowest dark:bg-inverse-surface rounded-xl overflow-hidden border border-outline-variant/30 hover:border-primary/20 transition-all custom-shadow group';
                item.innerHTML = `
                    <div class="w-full md:w-80 h-48 md:h-auto relative overflow-hidden">
                        <img class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" src="${images[0]}" alt="${title}"/>
                        <div class="absolute top-4 left-4 bg-white/95 backdrop-blur-sm px-sm py-xs rounded-full flex items-center gap-xs">
                            <span class="w-2 h-2 rounded-full ${statusColor}"></span>
                            <span class="text-[10px] font-bold uppercase tracking-wider text-on-surface">${b.status}</span>
                        </div>
                    </div>
                    <div class="flex-1 p-lg flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-label-sm text-primary mb-xs uppercase tracking-widest">${city}</p>
                                    <h3 class="font-headline-sm text-on-surface mb-xs cursor-pointer hover:underline" onclick="window.location.href='details.html?id=${b.propertyId}'">${title}</h3>
                                </div>
                                <div class="text-right">
                                    <p class="font-headline-sm text-primary">$${(b.totalPrice || 0).toLocaleString()}</p>
                                    <p class="font-label-sm text-on-surface-variant">Total Price</p>
                                </div>
                            </div>
                            <div class="mt-md flex flex-wrap gap-md">
                                <div class="flex items-center gap-xs text-on-surface-variant">
                                    <span class="material-symbols-outlined text-[20px]">calendar_today</span>
                                    <span class="font-body-md text-label-md">${formatDate(b.checkIn || b.checkInUtc)} - ${formatDate(b.checkOut || b.checkOutUtc)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                upcomingContainer.appendChild(item);
            }
        }

        pastContainer.innerHTML = '';
        if (past.length === 0) {
            pastContainer.innerHTML = `<p class="col-span-2 text-on-surface-variant text-label-md italic">No past stays recorded.</p>`;
        } else {
            for (const b of past) {
                let prop = null;
                try { prop = await HabittoAPI.getProperty(b.propertyId); } catch {}
                const images = prop?.images || ['https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=200&q=80'];
                const title  = prop?.title || b.propertyId;

                const card = document.createElement('div');
                card.className = 'flex items-center gap-md p-md bg-surface-container-low rounded-xl border border-transparent hover:border-outline-variant/50 transition-colors cursor-pointer';
                card.onclick = () => prop && (window.location.href = `details.html?id=${prop.id}`);
                card.innerHTML = `
                    <div class="w-20 h-20 rounded-lg overflow-hidden shrink-0">
                        <img class="w-full h-full object-cover" src="${images[0]}" alt="${title}"/>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-label-md text-on-surface truncate">${title}</h4>
                        <p class="font-label-sm text-on-surface-variant">${formatDate(b.checkIn || b.checkInUtc)} • ${b.status}</p>
                    </div>
                    <button onclick="event.stopPropagation(); alert('Receipt generation coming soon.');" class="p-2 rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant">
                        <span class="material-symbols-outlined">receipt_long</span>
                    </button>
                `;
                pastContainer.appendChild(card);
            }
        }
    }

    async function renderFavorites() {
        const user = Auth.getUser();
        const container = document.getElementById('favorites-grid');
        container.innerHTML = '<p class="col-span-full text-on-surface-variant text-label-md">Loading...</p>';

        let items = [];
        try {
            items = await HabittoAPI.getWishlist(user.id);
            wishlistIds = items.map(i => i.propertyId);
        } catch (e) {
            container.innerHTML = `<p class="col-span-full text-error font-label-md">Could not load favorites: ${e.message}</p>`;
            return;
        }

        container.innerHTML = '';

        if (items.length === 0) {
            container.innerHTML = `
                <div class="col-span-full py-xl text-center">
                    <span class="material-symbols-outlined text-[64px] text-outline-variant mb-md">favorite_border</span>
                    <h3 class="font-headline-sm text-on-surface mb-xs">No favorites saved</h3>
                    <p class="text-on-surface-variant">Click the heart icon on properties to save them here.</p>
                </div>
            `;
            return;
        }

        for (const item of items) {
            let prop = null;
            try { prop = await HabittoAPI.getProperty(item.propertyId); } catch {}
            if (!prop) continue;

            const images = prop.images || ['https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=400&q=80'];
            const card = document.createElement('div');
            card.className = 'flex flex-col group cursor-pointer hover-lift';
            card.innerHTML = `
                <div class="relative aspect-square rounded-xl overflow-hidden mb-md shadow-sm">
                    <img onclick="window.location.href='details.html?id=${prop.id}'" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${images[0]}" alt="${prop.title}"/>
                    <button class="absolute top-3 right-3 p-2 bg-white/30 backdrop-blur-md rounded-full text-red-500 hover:bg-white/50 transition-colors z-10" onclick="removeFavorite(event, '${prop.id}')">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
                    </button>
                </div>
                <div onclick="window.location.href='details.html?id=${prop.id}'" class="flex justify-between items-start">
                    <div>
                        <h3 class="font-label-md text-on-surface truncate w-40">${prop.title}</h3>
                        <p class="font-body-md text-label-sm text-on-surface-variant">${prop.city}</p>
                    </div>
                    <div class="flex items-center gap-xs">
                        <span class="material-symbols-outlined text-[16px] text-on-surface filled-icon">star</span>
                        <span class="font-label-md text-on-surface">${prop.rating || '5.0'}</span>
                    </div>
                </div>
                <p class="font-headline-sm text-primary mt-sm">$${prop.nightlyRate} <span class="font-label-sm text-on-surface-variant font-normal">night</span></p>
            `;
            container.appendChild(card);
        }
    }

    async function removeFavorite(e, propertyId) {
        e.stopPropagation();
        const user = Auth.getUser();
        try {
            await HabittoAPI.removeFromWishlist(user.id, propertyId);
            wishlistIds = wishlistIds.filter(id => id !== propertyId);
            renderFavorites();
        } catch (err) {
            alert('Could not remove from favorites: ' + err.message);
        }
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    window.addEventListener('DOMContentLoaded', () => {
        initTrips();
    });
</script>
</body>

                                    <p class="font-label-sm text-primary mb-xs uppercase tracking-widest">${prop.city}, ${prop.country}</p>
                                    <h3 class="font-headline-sm text-on-surface mb-xs cursor-pointer hover:underline" onclick="window.location.href='details.html?id=${prop.id}'">${prop.title}</h3>

                `;
                upcomingContainer.appendChild(item);
            });
        }

        if (past.length === 0) {
            pastContainer.innerHTML = `<p class="col-span-2 text-on-surface-variant text-label-md italic">No past stays recorded.</p>`;
        } else {
            past.forEach(b => {
                const prop = HabittoData.getProperty(b.propertyId);
                if (!prop) return;

                const card = document.createElement('div');
                card.className = "flex items-center gap-md p-md bg-surface-container-low rounded-xl border border-transparent hover:border-outline-variant/50 transition-colors cursor-pointer";
                card.onclick = () => window.location.href = `details.html?id=${prop.id}`;
                card.innerHTML = `
                    <div class="w-20 h-20 rounded-lg overflow-hidden shrink-0">
                        <img class="w-full h-full object-cover" src="${prop.images[0]}" alt="${prop.title}"/>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-label-md text-on-surface truncate">${prop.title}</h4>
                        <p class="font-label-sm text-on-surface-variant">${formatDate(b.checkIn)} • ${b.status}</p>
                    </div>
                    <button onclick="event.stopPropagation(); alert('Invoice PDF download simulation');" class="p-2 rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant"><span class="material-symbols-outlined">receipt_long</span></button>
                `;
                pastContainer.appendChild(card);
            });
        }
    }

    function renderFavorites() {
        const favIds = HabittoData.getFavorites() || [];
        const container = document.getElementById('favorites-grid');
        container.innerHTML = '';

        if (favIds.length === 0) {
            container.innerHTML = `
                <div class="col-span-full py-xl text-center">
                    <span class="material-symbols-outlined text-[64px] text-outline-variant mb-md">favorite_border</span>
                    <h3 class="font-headline-sm text-on-surface mb-xs">No favorites saved</h3>
                    <p class="text-on-surface-variant">Click the heart icon on properties to save them here.</p>
                </div>
            `;
            return;
        }

        favIds.forEach(id => {
            const prop = HabittoData.getProperty(id);
            if (!prop) return;

            const card = document.createElement('div');
            card.className = "flex flex-col group cursor-pointer hover-lift";
            card.innerHTML = `
                <div class="relative aspect-square rounded-xl overflow-hidden mb-md shadow-sm">
                    <img onclick="window.location.href='details.html?id=${prop.id}'" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${prop.images[0]}" alt="${prop.title}"/>
                    <button class="absolute top-3 right-3 p-2 bg-white/30 backdrop-blur-md rounded-full text-red-500 hover:bg-white/50 transition-colors z-10" onclick="removeFavorite(event, '${prop.id}')">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
                    </button>
                </div>
                <div onclick="window.location.href='details.html?id=${prop.id}'" class="flex justify-between items-start">
                    <div>

    function removeFavorite(e, propertyId) {
        e.stopPropagation();
        HabittoData.toggleFavorite(propertyId);
        renderFavorites();

    function handleCancelStay(bookingId) {
        if (confirm("Are you sure you want to cancel this booking?")) {
            HabittoData.cancelBooking(bookingId);
            renderBookings();
        }
    }

    function formatDate(dateStr) {
        const options = { month: 'short', day: 'numeric', year: 'numeric' };
        return new Date(dateStr).toLocaleDateString('en-US', options);
    }

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(initTrips, 100);
