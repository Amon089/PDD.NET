<script src="app.js"></script>
<script>
    let activeCategory = 'All';
    let allProperties = [];   // cache from API
    let wishlistIds = [];     // cache from API

    function focusSearch() {
        document.getElementById('search-city').focus();
    }

    async function loadWishlist() {
        const user = Auth.getUser();
        if (!user) { wishlistIds = []; return; }
        try {
            const items = await HabittoAPI.getWishlist(user.id);
            wishlistIds = items.map(w => w.propertyId);
        } catch { wishlistIds = []; }
    }

    async function loadAndRenderProperties() {
        const grid = document.getElementById('properties-grid');
        const countText = document.getElementById('showing-count-text');
        grid.innerHTML = `<div class="col-span-full py-xl text-center"><span class="material-symbols-outlined animate-spin text-[48px] text-primary">autorenew</span><p class="mt-md text-on-surface-variant">Loading properties...</p></div>`;

        try {
            const city = document.getElementById('search-city').value.trim() || undefined;
            const checkin = document.getElementById('search-checkin').value || undefined;
            allProperties = await HabittoAPI.getProperties({ city, from: checkin });
        } catch (e) {
            grid.innerHTML = `<div class="col-span-full py-xl text-center"><span class="material-symbols-outlined text-[48px] text-error mb-md">wifi_off</span><h3 class="font-headline-sm text-on-surface mb-xs">Cannot connect to API</h3><p class="text-on-surface-variant text-label-md">Make sure the backend is running at <code>http://localhost:8080</code>.</p></div>`;
            countText.textContent = 'API unavailable';
            return;
        }

        renderProperties();
    }

    function renderProperties() {
        const grid = document.getElementById('properties-grid');
        const countText = document.getElementById('showing-count-text');

        let list = [...allProperties];

        // Frontend category filter (backend doesn't have this field yet)
        if (activeCategory !== 'All') {
            list = list.filter(p => (p.category || '').toLowerCase() === activeCategory.toLowerCase());
        }

        grid.innerHTML = '';

        if (list.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-xl text-center">
                    <span class="material-symbols-outlined text-[64px] text-outline-variant mb-md">search_off</span>
                    <h3 class="font-headline-sm text-on-surface mb-xs">No properties found</h3>
                    <p class="text-on-surface-variant">Try adjusting your filters or search query.</p>
                </div>
            `;
            countText.textContent = 'Showing 0 properties';
            return;
        }

        list.forEach(p => {
            const isFav = wishlistIds.includes(p.id);
            const images = p.images || ['https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=600&q=80'];
            const card = document.createElement('div');
            card.className = 'property-card group cursor-pointer';
            card.innerHTML = `
                <div class="relative aspect-square overflow-hidden rounded-xl mb-md">
                    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 image-zoom" style="background-image: url('${images[0]}')"></div>
                    <div class="absolute top-md left-md bg-surface-container-lowest text-on-surface px-sm py-xs rounded-lg text-label-sm font-bold shadow-sm">${p.category || 'Property'}</div>
                    <button class="absolute top-md right-md p-2 bg-black/30 backdrop-blur-md rounded-full text-white hover:scale-110 transition-transform z-10" onclick="toggleHeart(event, '${p.id}', this)">
                        <span class="material-symbols-outlined ${isFav ? 'filled-icon text-red-400' : ''}" style="${isFav ? "font-variation-settings:'FILL' 1" : ''}">favorite</span>
                    </button>
                </div>
                <div onclick="navigateToDetail('${p.id}')" class="flex justify-between items-start cursor-pointer">
                    <div>
                        <h3 class="font-headline-sm text-headline-sm text-on-surface truncate w-48">${p.title}</h3>
                        <p class="text-on-surface-variant">${p.city}</p>
                        <p class="mt-xs text-on-surface-variant"><span class="font-bold text-on-surface">$${p.nightlyRate}</span> night</p>
                    </div>
                    <div class="flex items-center gap-xs font-label-md">
                        <span class="material-symbols-outlined text-primary filled-icon text-[18px]">star</span>
                        <span>${p.rating || '5.0'}</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        countText.textContent = `Showing ${list.length} properties`;
    }

    async function toggleHeart(e, propertyId, button) {
        e.stopPropagation();
        const user = Auth.getUser();
        if (!user) {
            HabittoUI.toggleAuthModal(true, 'login');
            return;
        }

        const icon = button.querySelector('.material-symbols-outlined');
        const isFav = wishlistIds.includes(propertyId);

        try {
            if (isFav) {
                await HabittoAPI.removeFromWishlist(user.id, propertyId);
                wishlistIds = wishlistIds.filter(id => id !== propertyId);
                icon.classList.remove('filled-icon', 'text-red-400');
                icon.style.fontVariationSettings = "'FILL' 0";
            } else {
                await HabittoAPI.addToWishlist(user.id, propertyId);
                wishlistIds.push(propertyId);
                icon.classList.add('filled-icon', 'text-red-400');
                icon.style.fontVariationSettings = "'FILL' 1";
                button.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.3)' }, { transform: 'scale(1)' }], { duration: 300, easing: 'ease-out' });
            }
        } catch (err) {
            alert('Could not update wishlist: ' + err.message);
        }
    }

    function filterByCategory(category, btn) {
        activeCategory = category;
        document.querySelectorAll('.category-filter-btn').forEach(b => {
            b.className = 'flex flex-col items-center gap-xs text-on-surface-variant opacity-60 hover:opacity-100 border-b-2 border-transparent hover:border-outline-variant pb-2 group transition-all category-filter-btn';
        });
        btn.className = 'flex flex-col items-center gap-xs text-primary border-b-2 border-primary pb-2 opacity-100 group transition-all category-filter-btn';
        renderProperties();
    }

    async function handleSearch(e) {
        e.preventDefault();
        await loadAndRenderProperties();
    }

    function navigateToDetail(id) {
        const checkin = document.getElementById('search-checkin').value;
        const guests = document.getElementById('search-guests').value;
        let url = `details.html?id=${id}`;
        if (checkin) url += `&checkIn=${checkin}`;
        if (guests) url += `&guests=${guests}`;
        window.location.href = url;
    }

    window.addEventListener('DOMContentLoaded', async () => {
        await loadWishlist();
        await loadAndRenderProperties();
    });
</script>
</body>
</html>
